name: Guardrails

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check versioning and tracked artifacts
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          repo_root = Path.cwd()
          pyproject = repo_root / "pyproject.toml"
          package_init = repo_root / "chatter" / "__init__.py"

          def fail(message: str) -> None:
              print(f"ERROR: {message}", file=sys.stderr)
              raise SystemExit(1)

          def section_lines(text: str, header: str) -> list[str]:
              current_header = None
              lines: list[str] = []
              for raw_line in text.splitlines():
                  stripped = raw_line.strip()
                  if stripped.startswith("[") and stripped.endswith("]"):
                      current_header = stripped
                      continue
                  if current_header == header:
                      lines.append(raw_line)
              return lines

          pyproject_text = pyproject.read_text()
          project_lines = section_lines(pyproject_text, "[project]")
          dynamic_lines = section_lines(pyproject_text, "[tool.setuptools.dynamic]")

          if any(line.strip().startswith("version =") for line in project_lines):
              fail("pyproject.toml [project] should not define a hard-coded version.")

          if not any(re.search(r'dynamic\s*=\s*\[[^\]]*"version"[^\]]*\]', line) for line in project_lines):
              fail('pyproject.toml [project] must declare dynamic = ["version"].')

          if not any('version = {attr = "chatter.__version__"}' in line for line in dynamic_lines):
              fail('pyproject.toml [tool.setuptools.dynamic] must use version = {attr = "chatter.__version__"}.')

          match = re.search(
              r'^__version__\s*=\s*"(?P<version>[^"]+)"\s*$',
              package_init.read_text(),
              flags=re.MULTILINE,
          )
          if not match:
              fail(f"Could not find __version__ in {package_init}")

          version = match.group("version")
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              fail(f'chatter.__version__ should look like "X.Y.Z", found "{version}".')

          tracked = subprocess.run(
              ["git", "ls-files"],
              capture_output=True,
              text=True,
              check=True,
          )
          status = subprocess.run(
              ["git", "status", "--porcelain"],
              capture_output=True,
              text=True,
              check=True,
          )
          deleted_paths = {
              line[3:]
              for line in status.stdout.splitlines()
              if len(line) > 3 and "D" in line[:2]
          }

          offenders = []
          for raw_path in tracked.stdout.splitlines():
              if raw_path in deleted_paths:
                  continue
              path = Path(raw_path)
              if path.parts and path.parts[0] in {"build", "dist"}:
                  offenders.append(raw_path)
                  continue
              if any(part == "__pycache__" for part in path.parts):
                  offenders.append(raw_path)
                  continue
              if any(part.endswith(".egg-info") for part in path.parts):
                  offenders.append(raw_path)

          if offenders:
              print("ERROR: Generated artifacts are tracked in git:", file=sys.stderr)
              for path in offenders:
                  print(f"  - {path}", file=sys.stderr)
              raise SystemExit(1)

          print("Repository guardrails passed.")
          PY

  package-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package metadata without runtime deps
        run: python -m pip install -e . --no-deps
      - name: Compare installed metadata to source version
        run: python -c "from importlib.metadata import version; import chatter; assert version('chatter') == chatter.__version__"
